name: Playwright Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_AWS_REGION: ${{ secrets.COGNITO_AWS_REGION }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_SCOPE: ${{ secrets.COGNITO_SCOPE }}
          COGNITO_TOKEN_URL: ${{ secrets.COGNITO_TOKEN_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          QUAID_API_BASE_URL: ${{ secrets.QUAID_API_BASE_URL }}
          E2E_M2M_CLIENT_ID: ${{ secrets.E2E_M2M_CLIENT_ID }}
          E2E_M2M_CLIENT_SECRET: ${{ secrets.E2E_M2M_CLIENT_SECRET }}
          E2E_M2M_SCOPE: ${{ secrets.E2E_M2M_SCOPE }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
